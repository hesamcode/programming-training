<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>آموزش برنامه نویسی</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

    <style>
      :root {
        --bg-1: #ffffff;
        --bg-2: #f4f4f4;

        --border-1: #cbd5e1;
        --border-2: #94a3b8;

        --text-1: #0f172a;
        --text-2: #475569;

        --primary: #0bb;
        --secondary: #b0b;

        --html: #e34f26;
        --css: #264de4;
        --js: #ffb100;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      ::-webkit-scrollbar {
        display: none;
      }

      button {
        border: none;
        cursor: pointer;
      }

      button:disabled {
        background-color: var(--border-1);
        color: var(--text-2);
        cursor: not-allowed;
        opacity: 0.6;
      }

      html {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      body {
        width: 100%;
        height: 100%;
        background-color: var(--bg-2);
        color: var(--text-1);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        overflow: hidden;
        position: relative;
      }

      .message,
      .confirm-message {
        width: calc(100% - 24px);
        height: auto;
        padding: 12px;
        background-color: var(--bg-1);
        border-radius: 12px;
        border: 1px solid var(--border-2);
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 12px;
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
      }

      .confirm-message {
        justify-content: space-between;
      }

      .confirm-message-box {
        width: auto;
        height: auto;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
      }

      .message-icon {
        width: 40px;
        height: 40px;
        background-color: var(--bg-2);
        border-radius: 50%;
        border: 2px solid transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .message-success-icon {
        background-color: #d4edda;
        color: #155724;
        border-color: #c3e6cb;
      }

      .message-warn-icon {
        background-color: #fff3cd;
        color: #856404;
        border-color: #ffeeba;
      }

      .message-error-icon {
        background-color: #f8d7da;
        color: #721c24;
        border-color: #f5c6cb;
      }

      .message-info-icon {
        background-color: #d1ecf1;
        color: #0c5460;
        border-color: #bee5eb;
      }

      .message-content {
        width: auto;
        height: auto;
        max-height: 300px;
        direction: rtl;
        text-align: right;
      }

      .confirm-message-confirm-button,
      .confirm-message-cancel-button {
        width: auto;
        height: 40px;
        padding: 12px 16px;
        background-color: var(--primary);
        border-radius: 12px;
        font-size: 16px;
        font-weight: 800;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .confirm-message-cancel-button {
        background-color: #c00;
      }

      .container {
        width: 100%;
        height: 100%;
        padding: 12px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        gap: 10px;
        overflow-y: auto;
        position: relative;
      }

      .section {
        width: 100%;
        height: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-content: center;
        text-align: center;
        gap: 16px;
        scroll-margin-top: 70px;
      }

      .section-box {
        width: 100%;
        height: auto;
        display: flex;
        justify-content: space-between;
        align-content: center;
        text-align: center;
        gap: 16px;
      }

      .section-box-action {
        width: auto;
        height: auto;
        display: flex;
        justify-content: center;
        align-content: center;
        gap: 12px;
      }

      .section-title {
        text-align: center;
        font-size: 20px;
        font-weight: 700;
        color: var(--text-1);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
      }

      .show-editor-button {
        width: auto;
        height: 40px;
        padding: 0 12px;
        background-color: var(--secondary);
        color: var(--text-1);
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
      }

      .card {
        width: 100%;
        height: auto;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        gap: 16px;
      }

      .course {
        width: 100%;
        height: auto;
        background-color: var(--bg-1);
        border-radius: 10px;
        border: 2px solid var(--border-1);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
      }

      .course-intro {
        border-color: var(--primary);
      }

      .course-html {
        border-color: var(--html);
      }

      .course-css {
        border-color: var(--css);
      }

      .course-js {
        border-color: var(--js);
      }

      .course-content {
        width: 100%;
        height: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        gap: 8px;
      }

      .course-title {
        color: var(--text-1);
        font-size: 18px;
      }

      .course-title-intro {
        color: var(--primary);
      }

      .course-title-html {
        color: var(--html);
      }

      .course-title-css {
        color: var(--css);
      }

      .course-title-js {
        color: var(--js);
      }

      .course-description {
        color: var(--text-2);
        font-size: 14px;
        line-height: 1.6;
        text-align: right;
      }

      .course-actions {
        width: 100%;
        height: auto;
        padding: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
      }

      .start-course-btn {
        width: calc(100% - 62px);
        height: 40px;
        background-color: transparent;
        color: var(--text-1);
        border-radius: 8px;
        border: 1px solid var(--border-1);
        font-size: 14px;
        font-weight: bold;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .start-course-btn-intro {
        border-color: var(--primary);
      }

      .start-course-btn-html {
        border-color: var(--html);
      }

      .start-course-btn-css {
        border-color: var(--css);
      }

      .start-course-btn-js {
        border-color: var(--js);
      }

      .start-course-btn-background {
        width: 0%;
        height: 100%;
        background-color: var(--bg-2);
        transition: width 2s ease;
      }

      .start-course-btn-background-intro {
        background-color: var(--primary);
      }

      .start-course-btn-background-html {
        background-color: var(--html);
      }

      .start-course-btn-background-css {
        background-color: var(--css);
      }

      .start-course-btn-background-js {
        background-color: var(--js);
      }

      @keyframes fillingUp {
        0% {
          width: 0%;
        }
        50% {
          width: 100%;
        }
        100% {
          width: 0%;
        }
      }

      .start-course-btn-text {
        width: 100%;
        height: 100%;
        background-color: transparent;
        font-size: 15px;
        color: var(--text-1);
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        gap: 12px;
        position: absolute;
        top: 0;
      }

      .reset-course-btn,
      .reset-all-course-btn {
        width: 40px;
        height: 40px;
        background-color: #fcc;
        color: #c00;
        border-radius: 12px;
        border: none;
        font-size: 16px;
        font-weight: bold;
      }

      .lesson-container {
        width: 100%;
        height: 100%;
        background-color: var(--bg-2);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        position: relative;
      }

      .lesson-header {
        width: 100%;
        height: 60px;
        padding: 10px;
        background-color: var(--bg-2);
        border-bottom: 1px solid var(--border-2);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        z-index: 10;
      }

      .lesson-header-box {
        width: auto;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
      }

      .lesson-title {
        font-size: 16px;
        font-weight: bold;
        color: var(--text-1);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
      }

      .return-btn,
      .lesson-menu,
      .close-lesson-menu {
        width: 40px;
        height: 40px;
        background-color: transparent;
        color: var(--text-2);
        border-radius: 12px;
        border: none;
        font-size: 15px;
        font-weight: bold;
      }

      .lesson-menu {
        background-color: var(--secondary);
      }

      .return-btn,
      .close-lesson-menu {
        background-color: var(--bg-1);
        color: var(--text-1);
      }

      .progress-wrapper {
        width: 100%;
        height: 20px;
        background-color: var(--bg-1);
        border-bottom: 1px solid var(--border-2);
        overflow: hidden;
        position: relative;
        z-index: 9;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background-color: var(--primary);
        transition: width 0.3s ease;
      }

      .progress-bar-html {
        background-color: var(--html);
      }

      .progress-bar-css {
        background-color: var(--css);
      }

      .progress-bar-js {
        background-color: var(--js);
      }

      .progress-text {
        width: 100%;
        height: 100%;
        background-color: transparent;
        font-size: 15px;
        color: var(--text-1);
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: absolute;
        top: 0;
      }

      .lessons {
        width: 100%;
        height: calc(100% - 80px);
        padding: 10px;
        background-color: var(--bg-1);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 10px;
        overflow-y: auto;
        position: absolute;
        top: 81px;
        z-index: 10;
      }

      .lesson-btn {
        width: 100%;
        height: 40px;
        padding: 0 12px;
        background-color: var(--bg-2);
        color: #721c24;
        border-radius: 10px;
        border: 1px solid var(--border-2);
        font-size: 16px;
        display: flex;
        flex-shrink: 0;
        justify-content: flex-start;
        align-items: center;
        gap: 12px;
      }

      .lesson-btn-un-locked {
        color: #856404;
      }

      .lesson-btn-read {
        color: #155724;
      }

      .lesson-btn-active {
        background-color: var(--primary);
        color: white;
        border: none;
        font-weight: bold;
      }

      .lesson {
        width: 100%;
        height: calc(100% - 140px);
        padding: 10px;
        background-color: var(--bg-1);
        font-family: "Vazirmatn", sans-serif;
        text-align: right;
        white-space: pre-wrap;
        word-break: break-word;
        direction: rtl;
        overflow-y: auto;
      }

      .lesson-exercise {
        width: 100%;
        height: calc(100% - 140px);
        padding: 10px;
        background-color: var(--bg-1);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        gap: 10px;
      }

      .lesson-exercise-content {
        width: 100%;
        height: auto;
        font-family: "Vazirmatn", sans-serif;
        text-align: right;
        white-space: pre-wrap;
        word-break: break-word;
        direction: rtl;
      }

      .lesson-action {
        width: 100%;
        height: 60px;
        padding: 10px;
        background-color: var(--bg-2);
        border-top: 1px solid var(--border-2);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        position: fixed;
        bottom: 0;
      }

      .lesson-action-box {
        width: 100%;
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .prev-lesson-btn,
      .return-lesson-btn {
        width: 50%;
        height: 40px;
        background-color: var(--secondary);
        color: var(--text-1);
        border-radius: 10px;
      }

      .check-exercise-btn,
      .next-lesson-btn,
      .go-exercise-btn {
        width: 50%;
        height: 40px;
        background-color: var(--primary);
        color: var(--text-1);
        border-radius: 10px;
      }

      .code-container {
        width: 100%;
        height: 400px;
        background: var(--bg-1);
        border-radius: 10px;
        border: 1px solid var(--border-1);
        overflow: hidden;
        position: relative;
      }

      .show-editor {
        height: 100% !important;
        border-radius: 0;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .code-header {
        width: 100%;
        height: 60px;
        background-color: var(--bg-2);
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        border-bottom: 1px solid var(--border-1);
      }

      .code-header-box {
        width: auto;
        height: auto;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        text-align: center;
        gap: 12px;
      }

      .header-buttons {
        width: auto;
        height: auto;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        gap: 12px;
      }

      .copy-code,
      .run-code,
      .view-code {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        font-weight: bold;
        color: white;
      }

      .copy-code {
        background-color: var(--secondary);
      }

      .run-code {
        background-color: var(--primary);
      }

      .view-code {
        background-color: var(--secondary);
      }

      .hide-editor-button {
        width: 40px;
        height: 40px;
        background-color: var(--bg-1);
        color: var(--text-1);
        border-radius: 12px;
        border: none;
        font-size: 15px;
        font-weight: bold;
      }

      .code-language,
      .output-title {
        width: auto;
        max-width: 200px;
        height: 40px;
        background-color: var(--bg-1);
        color: var(--text-1);
        padding: 0 10px;
        border-radius: 10px;
        border: 1px solid var(--border-1);
        font-size: 15px;
        font-weight: bold;
        font-family: monospace, Consolas, Monaco, "Andale Mono";
        display: flex;
        align-items: center;
        text-align: left;
        direction: ltr;
        white-space: nowrap;
        overflow-x: auto;
      }

      .code-editor,
      .code-output {
        width: 100%;
        height: calc(100% - 60px);
      }

      .CodeMirror {
        width: 100%;
        height: 100%;
        border: none;
        font-size: 15px;
        font-weight: 600;
        font-family: monospace, Consolas, Monaco, "Andale Mono";
        text-align: left;
        direction: ltr;
        line-height: 1.6;
        letter-spacing: 1.6;
        word-spacing: 1.6;
        white-space: pre;
        resize: none;
      }

      .editor {
        width: 100%;
        height: 100%;
        background-color: #1e1e2e;
        color: #cbd5e1;
        border: none;
        padding: 10px;
        font-size: 15px;
        font-weight: 600;
        font-family: monospace, Consolas, Monaco, "Andale Mono";
        text-align: left;
        direction: ltr;
        line-height: 1.6;
        letter-spacing: 1.6;
        word-spacing: 1.6;
        white-space: pre;
        resize: none;
        overflow: auto;
      }

      .output {
        width: 100%;
        height: 100%;
        background-color: white;
        border: none;
      }

      .code-box {
        width: 100%;
        max-width: 100%;
        height: auto;
        background: var(--bg-2);
        border-radius: 10px;
        border: 1px solid var(--border-1);
        font-family: sans-serif;
        text-align: left;
        direction: rtl;
        position: relative;
        margin: 10px auto;
        overflow: hidden;
      }

      .copy-code-button {
        width: 30px;
        height: 30px;
        background-color: var(--secondary);
        color: white;
        padding: 5px;
        border-radius: 5px;
        border: none;
        font-size: 10px;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        margin: 10px 10px 10px 0;
      }

      .language {
        width: auto;
        height: 30px;
        background-color: var(--bg-1);
        color: var(--text-1);
        padding: 5px;
        border-radius: 5px;
        border: 1px solid var(--border-1);
        font-size: 12px;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        position: absolute;
        top: 10px;
        left: 10px;
      }

      .code {
        width: 100%;
        max-width: 100%;
        height: auto;
        padding: 10px !important;
        background-color: #0f172a !important;
        border-radius: 0 0 9px 9px !important;
        border-top: 1px solid var(--border-1);
        margin: 0 !important;
        font-size: 15px !important;
        font-family: Consolas, Monaco, "Andale Mono", monospace !important;
        text-align: left;
        text-shadow: none !important;
        direction: ltr;
        line-height: normal;
        letter-spacing: normal;
        word-spacing: normal;
        white-space: pre !important;
        overflow-x: auto !important;
        resize: none;
      }

      strong {
        font-weight: bold;
        color: var(--text-1);
      }

      .little-code {
        width: auto !important;
        max-width: 100%;
        height: auto;
        padding: 3px;
        background-color: var(--bg-2);
        color: var(--text-1);
        border-radius: 5px;
        border: 1px solid var(--border-1);
        font-size: 12px;
        font-weight: 600;
        font-family: Consolas, Monaco, "Andale Mono", monospace !important;
        display: inline-block;
        text-align: left;
        direction: ltr;
      }

      .blockquote {
        width: 100%;
        height: auto;
        padding: 10px;
        background-color: var(--bg-2);
        border-radius: 10px;
        border: 1px solid var(--border-2);
        font-style: italic;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 15px;
      }

      .blockquote-border {
        width: 5px;
        background-color: var(--primary);
        border-radius: 5px;
        align-self: stretch;
      }

      .hide {
        opacity: 0;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="message hidden">
      <i class="message-icon"></i>
      <div class="message-content"></div>
    </div>

    <div class="confirm-message hidden">
      <div class="confirm-message-content"></div>
      <div class="confirm-message-box">
        <button class="confirm-message-confirm-button">بله</button>
        <button class="confirm-message-cancel-button">خیر</button>
      </div>
    </div>

    <div class="container hidden">
      <div class="section">
        <div class="section-box">
          <h2 class="section-title">
            <i class="fas fa-arrow-down"></i>
            <span>دوره های آموزشی</span>
            <i class="fas fa-arrow-down"></i>
          </h2>
          <div class="section-box-action">
            <button class="reset-all-course-btn">
              <i class="fas fa-trash-alt"></i>
            </button>
            <button class="show-editor-button">ادیتور</button>
          </div>
        </div>

        <div class="card courses"></div>
      </div>
    </div>

    <div class="lesson-container hidden">
      <div class="lesson-header">

      function loadProgress() {
        const saved = localStorage.getItem("webDevProgress");
        if (saved) {
          userProgress = JSON.parse(saved);
        }
      }

      function saveProgress() {
        localStorage.setItem("webDevProgress", JSON.stringify(userProgress));
      }

      function initCourseProgress(courseId, lessons) {
        if (userProgress[courseId]) return;

        const progress = {};
        lessons.forEach((lesson, index) => {
          progress[lesson.id] = {
            read: false,
            unlocked: index === 0,
          };
        });
        userProgress[courseId] = progress;
        saveProgress();
      }

      function getCourseStatus(courseId, lessons) {
        if (!userProgress[courseId]) return "not_started";

        const allRead = lessons.every(
          (lesson) => userProgress[courseId][lesson.id]?.read === true,
        );
        return allRead ? "completed" : "in_progress";
      }

      function findNextLesson(courseId, lessons) {
        const progress = userProgress[courseId];
        if (!progress) return null;

        for (let i = 0; i < lessons.length; i++) {
          const lesson = lessons[i];
          const status = progress[lesson.id];
          if (status?.unlocked && !status?.read) {
            return { lessonIndex: i, lesson };
          }
        }
        return null;
      }

      function completeLesson(courseId, lessonId, lessonIndex, lessons) {
        userProgress[courseId][lessonId].read = true;

        const nextLesson = lessons[lessonIndex + 1];
        if (nextLesson) {
          if (!userProgress[courseId][nextLesson.id]) {
            userProgress[courseId][nextLesson.id] = {
              read: false,
              unlocked: false,
            };
          }
          userProgress[courseId][nextLesson.id].unlocked = true;
        }

        saveProgress();
      }

      function escapeHtml(text) {
        if (!text) return "";
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatMessage(text) {
        if (!text) return "";

        let message = escapeHtml(text);

        message = message.replace(
          /```(\w+)?\n([\s\S]*?)```\n?/g,
          (match, lang = "text", code) => {
            return `<div class="code-box"><div class="language">${lang}</div><button class="copy-code-button"><i class="fas fa-copy"></i></button><pre class="code language-${lang}"><code>${code}</code></pre></div>`;
          },
        );

        message = message.replace(/``([^`]+)``/g, (match, content) => {
          return `<code class="little-code">${content}</code>`;
        });

        message = message.replace(/\*\*(.*?)\*\*/g, (match, content) => {
          return `<strong>${content}</strong>`;
        });

        message = message.replace(
          /^(#{1,3})\s+(.+)$/gm,
          (match, hashes, content) => {
            const level = hashes.length;
            return `<h${level}>${content}</h${level}>`;
          },
        );

        message = message.replace(/^,,\s+(.+)$/gm, (match, content) => {
          return `<div class="blockquote"><div class="blockquote-border"></div><p>${content}</p></div>`;
        });

        return message;
      }

          const isRead = lessonStatus?.read || false;

          let btnClass = "lesson-btn";
          if (isRead) btnClass += " lesson-btn-read";
          if (isUnlocked) btnClass += " lesson-btn-un-locked";
          if (index === currentLessonIndex) btnClass += " lesson-btn-active";

          btn.className = btnClass;

          let statusIcon = "";
          if (isRead) {
            statusIcon = '<i class="fas fa-check-circle"></i>';
          } else if (!isUnlocked) {
            statusIcon = '<i class="fas fa-lock"></i>';
          } else {
            statusIcon = '<i class="fas fa-hourglass-half"></i>';
          }

          btn.innerHTML = `${statusIcon} ${lesson.title}`;

          btn.addEventListener("click", () => {
            if (isUnlocked) {
              inExercise = false;
              currentLessonIndex = index;
              renderLesson();
            } else {
              showMessage(
                "این درس قفل است. ابتدا درس‌های قبلی را تکمیل کنید.",
                "warn",
              );
            }
          });

          lessonsDiv.appendChild(btn);
        });
      }

      function updateProgress() {
        const currentCourse = courses[currentCourseIndex];
        const courseProgress = userProgress[currentCourse.id] || {};

        let completed = 0;
        currentCourse.lessons.forEach((lesson) => {
          if (courseProgress[lesson.id]?.read === true) {
            completed++;
          }
        });

        const total = currentCourse.lessons.length;
        const percent = total > 0 ? (completed / total) * 100 : 0;

        const progressBar = document.getElementById("progressBar");
        const progressText = document.getElementById("progressText");

        progressBar.className = `progress-bar progress-bar-${currentCourse.id}`;

        if (progressBar) {
          progressBar.style.width = `${percent}%`;
        }
        if (progressText) {
          progressText.textContent = `${completed} / ${total}`;
        }

        updateAllCourseButtons();
      }

      function checkExercise() {
        const currentCourse = courses[currentCourseIndex];
        const currentLesson = currentCourse.lessons[currentLessonIndex];
        const courseProgress = userProgress[currentCourse.id];
        const lessonStatus = courseProgress?.[currentLesson.id];

        if (lessonStatus?.read) {
          showMessage("قبلاً حل کردی!", "success");
          return;
        }

        const userCode = getEditorValue();
        const targetCode = currentLesson.exercise_code;

        const getUserWords = (code) => {
          return code
            .replace(/<\!--[\s\S]*?-->/g, " ")
            .replace(/\/\*[\s\S]*?\*\//g, " ")
            .replace(/\/\/[^\n]*/g, " ")
            .replace(/<[^>]*>/g, " ")
            .replace(/[{}()[\]="';:<>/\\|]/g, " ")
            .toLowerCase()
            .split(/\s+/)
            .filter((word) => word.length > 1);
        };

        const userWords = getUserWords(userCode);
        const targetWords = getUserWords(targetCode);

        if (userWords.length === 0) {
          showMessage("کدت خالیه!", "warn");
          return;
        }

        const commonWords = userWords.filter((word) =>
          targetWords.includes(word),
        );
        const matchPercent = (commonWords.length / targetWords.length) * 100;

        if (matchPercent >= 60) {
          completeLesson(
            currentCourse.id,
            currentLesson.id,
            currentLessonIndex,
            currentCourse.lessons,
          );
          renderLesson();
          showMessage("تمرین حل شد!", "success");
        } else {
          showMessage("تمرین حل نشد! دوباره تلاش کن.", "warn");
        }
      }

      async function copyCode(btn) {
        const code = btn.parentElement.querySelector("code").textContent;

        try {
          await navigator.clipboard.writeText(code);
          btn.innerHTML = '<i class="fas fa-check"></i>';
          setTimeout(() => {
            btn.innerHTML = `<i class="fas fa-copy"></i>`;
          }, 1000);
        } catch (err) {
          const textarea = document.createElement("textarea");
          textarea.value = code;
          textarea.style.position = "fixed";
          textarea.style.top = "-9999px";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();

          try {
            document.execCommand("copy");
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => {
              btn.innerHTML = `<i class="fas fa-copy"></i>`;
            }, 1000);
          } catch (fallbackErr) {
            showMessage(`Failed to copy code: ${fallbackErr}`, "error");
            btn.innerHTML = `<i class="fas fa-times"></i>`;
            setTimeout(() => {
              btn.innerHTML = `<i class="fas fa-copy"></i>`;
            }, 1000);
          }

          document.body.removeChild(textarea);
        }
      }

      lessonDiv.addEventListener("click", (e) => {
        const btn = e.target.closest(".copy-code-button");
        if (btn) copyCode(btn);
      });

      function initEditor() {
        if (typeof CodeMirror !== "undefined") {
          editor.classList.add("hidden");
          codeMirrorEditor = CodeMirror.fromTextArea(cmEditor, {
            mode: "htmlmixed",
            theme: "monokai",
            lineNumbers: true,
            lineWrapping: false,
            autoCloseTags: true,
            autoCloseBrackets: true,
            indentUnit: 2,
            tabSize: 2,
          });
          useCmEditor = true;
        } else {
          cmEditor.classList.add("hidden");
          useCmEditor = false;
        }
      }

      function getEditorValue() {
        if (useCmEditor) {
          return codeMirrorEditor.getValue();
        } else {
          return editor.value;
        }
      }

      function setEditorValue(value) {
        if (useCmEditor) {
          codeMirrorEditor.setValue(value);
        } else {
          editor.value = value;
        }
      }

      function refreshCm() {
        if (typeof CodeMirror !== "undefined") {
          codeMirrorEditor.refresh();
        }
      }

      copyCodeButton.addEventListener("click", async () => {
        const codeContent = getEditorValue();

        try {
          await navigator.clipboard.writeText(codeContent);
          copyCodeButton.innerHTML = '<i class="fas fa-check"></i>';
          setTimeout(() => {
            copyCodeButton.innerHTML = `<i class="fas fa-copy"></i>`;
          }, 1000);
        } catch (err) {
          const textarea = document.createElement("textarea");
          textarea.value = codeContent;
          textarea.style.position = "fixed";
          textarea.style.top = "-9999px";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();

          try {
            document.execCommand("copy");
            copyCodeButton.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => {
              copyCodeButton.innerHTML = `<i class="fas fa-copy"></i>`;
            }, 1000);
          } catch (fallbackErr) {
            showMessage(`Failed to copy code: ${fallbackErr}`, "error");
            copyCodeButton.innerHTML = `<i class="fas fa-times"></i>`;
            setTimeout(() => {
              copyCodeButton.innerHTML = `<i class="fas fa-copy"></i>`;
            }, 1000);
          }

          document.body.removeChild(textarea);
        }
      });

      function runCode() {
        const codeContent = getEditorValue();
        const titleMatch = codeContent.match(/<title>(.*?)<\/title>/i);
        outputTitle.textContent = titleMatch ? titleMatch[1] : "WebPage";
        outputIframe.srcdoc = codeContent;
        copyCodeButton.classList.add("hidden");
        runCodeButton.classList.add("hidden");
        codeLanguage.classList.add("hidden");
        codeEditorDiv.classList.add("hidden");

        viewCodeButton.classList.remove("hidden");
        outputTitle.classList.remove("hidden");
        codeOutputDiv.classList.remove("hidden");
      }

      function viewCode() {
        viewCodeButton.classList.add("hidden");
        outputTitle.classList.add("hidden");
        codeOutputDiv.classList.add("hidden");

        copyCodeButton.classList.remove("hidden");
        runCodeButton.classList.remove("hidden");
        codeLanguage.classList.remove("hidden");
        codeEditorDiv.classList.remove("hidden");
      }

      function showEditor() {
        lessonExDiv.removeChild(codeContainer);

        hideEditorBtn.classList.remove("hidden");
        codeContainer.classList.add("show-editor");

        container.appendChild(codeContainer);

        setEditorValue(
          '<!doctype html>\n<html lang="en">\n  <head>\n    <meta charset="UTF-8" />\n    <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n    <title>Document</title>\n  </head>\n  <body>\n  </body>\n</html>',
        );

        viewCode();

        refreshCm();
        editor.scrollTo(0, 0);
      }

      function hideEditor() {
        container.removeChild(codeContainer);

        hideEditorBtn.classList.add("hidden");
        codeContainer.classList.remove("show-editor");

        lessonExDiv.appendChild(codeContainer);

        setEditorValue("");

        refreshCm();

        renderCourses();
      }

      returnBtn.addEventListener("click", () => {
        inExercise = false;

        renderCourses();
      });

      lessonMenu.addEventListener("click", () => {
        lessonsDiv.classList.remove("hidden");

        lessonMenu.classList.add("hidden");
        closeLessonMenu.classList.remove("hidden");
      });

      closeLessonMenu.addEventListener("click", () => {
        lessonsDiv.classList.add("hidden");

        closeLessonMenu.classList.add("hidden");
        lessonMenu.classList.remove("hidden");
      });

      returnLessonBtn.addEventListener("click", () => {
        inExercise = false;

        renderLesson();
      });

      goExerciseBtn.addEventListener("click", () => {
        inExercise = true;

        renderLesson();
        viewCode();

        refreshCm();
        editor.scrollTo(0, 0);
      });

      prevLessonBtn.addEventListener("click", () => {
        if (currentLessonIndex > 0) {
          currentLessonIndex--;
          renderLesson();
        }
      });

      nextLessonBtn.addEventListener("click", () => {
        const currentCourse = courses[currentCourseIndex];
        const currentLesson = currentCourse.lessons[currentLessonIndex];
        const courseProgress = userProgress[currentCourse.id];
        const currentLessonStatus =
          courseProgress?.[currentCourse.lessons[currentLessonIndex].id];

        if (!currentLesson.is_exercise) {
          completeLesson(
            currentCourse.id,
            currentLesson.id,
            currentLessonIndex,
            currentCourse.lessons,
          );
        } else if (!currentLessonStatus?.read && currentLesson.is_exercise) {
          showMessage("ابتدا باید تمرین این درس رو با موفقیت پاس کنی.", "warn");
          return;
        }

        if (currentLessonIndex < currentCourse.lessons.length - 1) {
          const nextLesson = currentCourse.lessons[currentLessonIndex + 1];
          const nextLessonStatus = courseProgress?.[nextLesson.id];

          if (nextLessonStatus?.unlocked) {
            inExercise = false;
            currentLessonIndex++;
            renderLesson();
          }
        } else {
          completeLesson(
            currentCourse.id,
            currentLesson.id,
            currentLessonIndex,
            currentCourse.lessons,
          );

          renderLesson();
        }
      });

      resetAllCourseBtn.addEventListener("click", resetAllCourses);

      runCodeButton.addEventListener("click", runCode);

      viewCodeButton.addEventListener("click", viewCode);

      checkExerciseBtn.addEventListener("click", checkExercise);

      showEditorBtn.addEventListener("click", () => {
        showEditor();
      });

      hideEditorBtn.addEventListener("click", () => {
        hideEditor();
      });

      document.addEventListener("DOMContentLoaded", function () {
        loadProgress();
        renderCourses();
        initEditor();
      });
    </script>
  </body>
</html>
